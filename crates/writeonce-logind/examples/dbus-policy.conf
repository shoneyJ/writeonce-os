<!--
  D-Bus system bus policy for writeonce-logind.

  Install as /etc/dbus-1/system.d/org.freedesktop.login1.conf.

  Grants root the right to OWN the well-known name
  org.freedesktop.login1 (since systemd-logind isn't running). Grants
  every user the right to CALL into the manager + session +
  seat interfaces — the kernel ACLs and our own permission checks
  decide whether a given operation succeeds.

  This intentionally mirrors the policy file shipped by upstream
  systemd at src/login/org.freedesktop.login1.conf so that other
  packages' /etc/dbus-1/system.d/* drop-ins continue to work.
-->
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <policy user="root">
    <allow own="org.freedesktop.login1"/>
    <allow send_destination="org.freedesktop.login1"/>
    <allow receive_sender="org.freedesktop.login1"/>
  </policy>

  <policy context="default">
    <deny send_destination="org.freedesktop.login1"/>

    <!-- Lookups: any caller can find their own session / seats. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="GetSession"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="GetSessionByPID"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="GetCurrentSession"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="ListSessions"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="ListSeats"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="ListUsers"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="ListInhibitors"/>

    <!-- Inhibitors: any caller can register. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="Inhibit"/>

    <!-- Per-session lock/unlock: callers' own session, the daemon
         applies authorization. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="LockSession"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="UnlockSession"/>

    <!-- Power-state probes — read-only. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="CanReboot"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="CanPowerOff"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="CanSuspend"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="CanHibernate"/>

    <!-- Session + seat methods — fine-grained. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Session"
           send_member="Lock"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Session"
           send_member="Unlock"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Session"
           send_member="Activate"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Session"
           send_member="SetIdleHint"/>

    <!-- Read all properties. -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"/>

    <!-- Reboot / PowerOff — restricted to root via PolicyKit in real
         logind. We do the same here by allowing the request to reach
         us and refusing in-daemon if uid != 0. (For v1 we accept
         anyone; tighten later.) -->
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="Reboot"/>
    <allow send_destination="org.freedesktop.login1"
           send_interface="org.freedesktop.login1.Manager"
           send_member="PowerOff"/>

    <allow receive_sender="org.freedesktop.login1"/>
  </policy>

</busconfig>
