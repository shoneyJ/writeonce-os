# /etc/writeonce/services/dhcpcd.service.toml
#
# DHCP client. No interface argument — dhcpcd auto-discovers every
# UP interface via /sys/class/net (handles wired + wifi + virtual
# without per-hardware config).
#
# NOT pulled in by any target at boot. Users opt in via
# `wo-ctl enable dhcpcd.service`; the installer's headless profile
# pre-enables it at install time.

[unit]
description = "DHCP client (all interfaces)"
after       = ["sysinit.target"]

[service]
type        = "simple"
exec-start  = "/usr/sbin/dhcpcd --nobackground --quiet"
restart     = "on-failure"
restart-sec = "10s"
user        = "root"
group       = "root"
slice       = "system.slice"

# [install] omitted — see /etc/writeonce/enabled.d/dhcpcd.service.toml
# (created by `wo-ctl enable dhcpcd.service` or by the installer for
# headless profiles).
